[tool.black]
line-length = 88
exclude = '''
(
    /(
        \.git
        | \.hg
        | \.mypy_cache
        | \.tox
        | \.venv
        | _build
        | buck-out
        | build
        | dist
    )/
)
'''

[tool.pytest.ini_options]
pythonpath = ["src/py_lib"]
testpaths = ["test"]
# Automatically tracks coverage for your core scripts and outputs the visual report
addopts = "--cov=src/py_lib --cov-report=term-missing"
