# ==============================================================================
# 🧪 TESTING & CODE COVERAGE
# ==============================================================================

[tool.pytest.ini_options]
pythonpath = ["src/py_lib"]
testpaths = ["test"]
addopts = "--cov=src/py_lib --cov-report=term-missing"

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:"
]

# ==============================================================================
# 🦀 CODE QUALITY, LINTING & STATIC ANALYSIS (RUFF + MYPY)
# ==============================================================================

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
# E/W = Pycodestyle (Flake8), F = Pyflakes (Errors), I = Isort, PL = Pylint
select = ["E", "W", "F", "I", "PL"]

[tool.ruff.lint.per-file-ignores]
"test/**/*.py" = ["PLR2004"]  # Bypasses "magic numbers" warning inside unit testing files

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true

# ==============================================================================
# 📦 PROJECT MANAGEMENT & AUTOMATED RELEASES
# ==============================================================================

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.2.0"
update_changelog_on_bump = true
tag_format = "v$version"
major_version_zero = true  # Guarantees breaking changes bump minor instead of v1.0.0
version_files = [
    "pyproject.toml:version"
]

bump_message = "chore(release): bump version $current_version → $new_version"
