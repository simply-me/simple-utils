[tool.black]
line-length = 88
exclude = '''
(
    /(
        \.git
        | \.hg
        | \.mypy_cache
        | \.tox
        | \.venv
        | _build
        | buck-out
        | build
        | dist
    )/
)
'''

[tool.pytest.ini_options]
pythonpath = ["src/py_lib"]
testpaths = ["test"]
addopts = "--cov=src/py_lib --cov-report=term-missing"

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.0.0"               # Set this to your current starting version
version_files = [
    "pyproject.toml:version"     # Automatically updates the version string right here
]
update_changelog_on_bump = true
tag_format = "v$version"
