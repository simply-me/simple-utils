name: Validate, Build, and Release Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual trigger button for safe sandbox testing

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Authorizes the worker to push assets to GitHub Releases

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'src/py_lib/requirements.txt'

      # Quiet flags matching your build.sh settings to keep logs un-cluttered
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r src/py_lib/requirements.txt --quiet
          pip install ruff pytest pytest-cov mypy --quiet

      # Replicates your local staging sandbox environment exactly
      - name: Stage source code for clean validation
        run: |
          mkdir -p build/src
          cp -r src/* build/src/

      - name: Run Fundamental Syntax Check (Compileall)
        run: python -m compileall -q build/src/py_lib

      # Ruff syntax checks
      - name: Run Code Quality Linting (Ruff Check)
        run: ruff check build/src/py_lib

      # Verifies code formatting layouts match your 120-character rules
      - name: Verify Code Styling Formatting (Ruff Format)
        run: ruff format --check build/src/py_lib

      # Runs Mypy directly on your staged build sandbox target paths
      - name: Run Type Layout Verification (Mypy)
        run: python -m mypy build/src/py_lib/

      # Runs your tests against the isolated staging modules
      - name: Run Unit Tests and Track Coverage (Pytest)
        run: python -m pytest -o pythonpath="build/src/py_lib"

      # Packages everything cleanly and injects the Commitizen CHANGELOG.md file
      - name: Package application into ZIP archive
        run: |
          rm -rf dist
          mkdir -p dist/simple-utils

          # Copy strictly from your validated build sandbox
          cp -r build/src/* dist/simple-utils/

          # Safely package your local Commitizen changelog documentation inside the zip
          cp -f CHANGELOG.md dist/simple-utils/ 2>/dev/null || true

          # Perform the final package scrub to remove runtime test caches
          find dist/simple-utils/ -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find dist/simple-utils/ -type f -name "*.pyc" -delete 2>/dev/null || true

          cd dist
          python -c "import shutil; shutil.make_archive('simple-utils', 'zip', 'simple-utils')"

      # Upload the final zip file directly to your GitHub Release assets matrix
      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v0.1.0-test-{0}', github.run_number) }}
          files: dist/simple-utils.zip
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
